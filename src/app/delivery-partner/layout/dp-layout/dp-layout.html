<div class="dp-shell">
  <!-- Top bar (mobile-first: top nav) -->
  <header class="dp-topbar">
    <div class="dp-topbar__brand">
      <svg width="28" height="28" viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="18" r="18" fill="#D94F3D" />
        <path
          d="M10 22 Q14 10 18 14 Q22 18 26 10"
          stroke="#FFFDF5"
          stroke-width="2.5"
          stroke-linecap="round"
          fill="none"
        />
        <circle cx="18" cy="25" r="3" fill="#FF9933" />
      </svg>
      <span>Swadify <strong>Partner</strong></span>
    </div>

    <!-- Online toggle -->
    <label class="online-toggle">
      <input type="checkbox" [(ngModel)]="isOnline" />
      <span class="online-toggle__track">
        <span class="online-toggle__thumb"></span>
      </span>
      <span class="online-toggle__label" [class.online]="isOnline">
        {{ isOnline ? '🟢 Online' : '⚫ Offline' }}
      </span>
    </label>

    <button class="dp-topbar__logout" (click)="logout()">
      <svg
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
      >
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
        <polyline points="16 17 21 12 16 7" />
        <line x1="21" y1="12" x2="9" y2="12" />
      </svg>
    </button>
  </header>

  <!-- Main content -->
  <main class="dp-main">
    <router-outlet />
  </main>

  <!-- Bottom nav (mobile) -->
  <nav class="dp-bottom-nav">
    @for (item of navItems; track item.route) {
      <a class="dp-nav-item" [routerLink]="item.route" routerLinkActive="active">
        <span class="dp-nav-item__icon">{{ item.icon }}</span>
        <span class="dp-nav-item__label">{{ item.label }}</span>
      </a>
    }
  </nav>
</div>
<app-toast-component />
