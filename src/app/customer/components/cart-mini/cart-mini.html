<div class="cart-mini" [class.expanded]="open()">
  <button class="cart-mini__trigger" (click)="open.set(!open())">
    <svg
      width="20"
      height="20"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
    >
      <circle cx="9" cy="21" r="1" />
      <circle cx="20" cy="21" r="1" />
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
    </svg>
    <span class="cart-mini__count">{{ cart.totalItems() }}</span>
    <span class="cart-mini__label">{{ open() ? 'Hide' : 'Cart' }}</span>
  </button>

  @if (open()) {
    <div class="cart-mini__panel">
      <p class="cart-mini__restaurant">{{ cart.cart()?.restaurantName }}</p>
      <div class="cart-mini__items">
        @for (item of cart.items(); track item.menuItem.id) {
          <div class="cart-mini__item">
            <div class="veg-dot" [class.non-veg]="!item.menuItem.isVeg"></div>
            <span class="item-name">{{ item.menuItem.name }}</span>
            <span class="item-qty">× {{ item.quantity }}</span>
            <span class="item-price">₹{{ item.menuItem.price * item.quantity }}</span>
          </div>
        }
      </div>
      <div class="cart-mini__footer">
        <span class="subtotal"
          >Total: <strong>₹{{ cart.subtotal() }}</strong></span
        >
        <a routerLink="/cart" class="btn-primary btn-sm">View Cart</a>
      </div>
    </div>
  }
</div>
